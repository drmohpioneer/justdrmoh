<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>المساعد الذكي طارق — Cairo Heart Clinic</title>
<meta name="robots" content="noindex">
<style>
  :root{ --navy:#0f2236; --navy2:#16314c; --copper:#c8814b; --copper-soft:#e0a673; --ink:#eaf1f8; --muted:#9fb3c8; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Tahoma,"Helvetica Neue",Arial,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%,var(--navy2) 0%,var(--navy) 60%);
    color:var(--ink); min-height:100%;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
  }
  .card{ max-width:440px; width:100%; }
  .logo{ font-size:13px; letter-spacing:2px; color:var(--copper-soft); margin-bottom:18px; text-transform:uppercase; }
  h1{ font-size:26px; font-weight:800; margin-bottom:10px; }
  h1 .dot{ color:var(--copper); }
  p.sub{ color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:28px; }
  .ring{
    width:64px;height:64px;margin:0 auto 26px;border-radius:50%;
    border:4px solid rgba(200,129,75,.18); border-top-color:var(--copper);
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .bar{ height:6px;width:220px;max-width:80%;margin:0 auto 24px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;}
  .bar i{ display:block;height:100%;width:35%;background:linear-gradient(90deg,var(--copper),var(--copper-soft));border-radius:6px;
    animation:slide 1.6s ease-in-out infinite;}
  @keyframes slide{0%{margin-right:-35%}100%{margin-right:100%}}
  .btn{ display:none; margin:6px auto 0; padding:13px 26px; border-radius:12px; border:0;
    background:var(--copper); color:#1a1208; font-weight:700; font-size:15px; cursor:pointer; text-decoration:none; }
  .btn:hover{ background:var(--copper-soft); }
  .note{ margin-top:30px; font-size:12.5px; color:var(--muted); line-height:1.7; border-top:1px solid rgba(255,255,255,.07); padding-top:18px; }
  .note b{ color:var(--copper-soft); font-weight:700; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">CAIRO HEART CLINIC</div>
    <div class="ring"></div>
    <h1>بنحضّرلك المساعد طارق<span class="dot">.</span></h1>
    <p class="sub">لحظات وهيفتح معاك — أول زيارة بتاخد شوية وقت عشان المساعد بيقوم من وضع التوفير.</p>
    <div class="bar"><i></i></div>
    <a class="btn" id="go" href="https://cairo-heart-clinic-demo.onrender.com">افتح المساعد الآن</a>
    <p class="note">
      نموذج تجريبي على استضافة مجانية — <b>بوت مشروعك بيشتغل فوري وبدون أي انتظار</b> على استضافة مخصصة، وقابل للتعديل أو الإزالة بالكامل.
    </p>
  </div>

<script>
(function(){
  var TAREK = "https://cairo-heart-clinic-demo.onrender.com";
  var redirected = false;
  function go(){ if(redirected) return; redirected = true; window.location.replace(TAREK); }

  // Fire the wake request. Render holds this open during cold-start and
  // resolves it the moment the app is ready -> then we redirect to a warm app.
  fetch(TAREK, { mode:"no-cors", cache:"no-store" })
    .then(go)
    .catch(function(){ /* network/opaque issues: fall back to timers below */ });

  // Show a manual button after 10s for impatient visitors.
  setTimeout(function(){ document.getElementById("go").style.display = "inline-block"; }, 10000);

  // Safety net: if the wake-fetch never resolves, redirect anyway at 65s.
  setTimeout(go, 65000);
})();
</script>
</body>
</html>
